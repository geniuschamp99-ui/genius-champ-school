<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genius Champ English Medium School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --green-deep:#1E4A30;
  --green:#34A853;
  --green-dark:#2B8A45;
  --green-light:#E8F6EC;
  --yellow:#FFC93C;
  --yellow-deep:#F2A900;
  --yellow-light:#FFF8E1;
  --cream:#FFFBF2;
  --coral:#FF7A59;
  --blue:#4DA6FF;
  --purple:#A78BFA;
  --pink:#FF7AC6;
  --teal:#2EC4B6;
  --ink:#1F3327;
  --gray:#6F8278;
  --gray-light:#D9E6DD;
  --white:#FFFFFF;
  --radius-lg:22px;
  --radius-md:14px;
  --radius-sm:8px;
  --shadow:0 6px 24px rgba(30,74,48,0.10);
  --shadow-sm:0 2px 10px rgba(30,74,48,0.08);
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Nunito',sans-serif;
  color:var(--ink);
  background:var(--cream);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.watermark-layer{
  position:fixed; inset:0; z-index:-1; pointer-events:none;
  background-repeat:repeat;
  background-size:230px auto;
  opacity:0.045;
}
h1,h2,h3,h4,.display{font-family:'Baloo 2',sans-serif; font-weight:700; color:var(--green-deep);}
img{max-width:100%; display:block;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
.container{max-width:1180px; margin:0 auto; padding:0 24px;}
.visually-hidden{position:absolute; left:-9999px;}

/* Buttons */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  font-family:'Baloo 2',sans-serif; font-weight:600; font-size:1rem;
  padding:13px 28px; border-radius:50px; border:none; text-decoration:none;
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  cursor:pointer; white-space:nowrap;
}
.btn:focus-visible{outline:3px solid var(--green-deep); outline-offset:2px;}
.btn-primary{background:var(--green); color:#fff; box-shadow:0 6px 18px rgba(52,168,83,0.35);}
.btn-primary:hover{background:var(--green-dark); transform:translateY(-2px);}
.btn-yellow{background:var(--yellow); color:var(--green-deep); box-shadow:0 6px 18px rgba(255,201,60,0.45);}
.btn-yellow:hover{background:var(--yellow-deep); transform:translateY(-2px);}
.btn-outline{background:transparent; color:var(--green-deep); border:2px solid var(--green-deep);}
.btn-outline:hover{background:var(--green-light);}
.btn-sm{padding:8px 18px; font-size:.88rem;}
.btn-danger{background:#fff; color:var(--coral); border:2px solid var(--coral);}
.btn-danger:hover{background:#FFF1ED;}
.btn-block{width:100%;}

/* ===== TOP NAV (public) ===== */
.topbar{
  position:sticky; top:0; z-index:50;
  background:rgba(255,251,242,0.92); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--gray-light);
}
.topbar .container{display:flex; align-items:center; justify-content:space-between; padding:12px 24px;}
.brand{display:flex; align-items:center; gap:12px; text-decoration:none;}
.brand img{height:46px; width:46px; object-fit:cover; border-radius:50%; border:2px solid var(--yellow-deep); box-shadow:0 2px 8px rgba(30,74,48,0.3);}
.brand-text{display:flex; flex-direction:column; line-height:1.15;}
.brand-text strong{font-family:'Baloo 2',sans-serif; font-size:1.15rem; color:var(--green-deep);}
.brand-text span{font-size:.74rem; color:var(--gray); font-weight:700; letter-spacing:.06em; text-transform:uppercase;}
.nav-links{display:flex; align-items:center; gap:26px; font-weight:700; font-size:.95rem;}
.nav-links a{text-decoration:none; color:var(--ink); transition:color .15s;}
.nav-links a:hover{color:var(--green);}
.nav-actions{display:flex; align-items:center; gap:12px;}
.menu-toggle{display:none; background:none; border:none; font-size:1.6rem; color:var(--green-deep);}
@media (max-width:880px){
  .nav-links{display:none;}
  .menu-toggle{display:block;}
  .nav-mobile{display:flex; flex-direction:column; gap:0; background:var(--white); border-top:1px solid var(--gray-light);}
  .nav-mobile a, .nav-mobile button{padding:14px 24px; text-align:left; border:none; background:none; font-weight:700; font-size:1rem; text-decoration:none; color:var(--ink); border-bottom:1px solid var(--gray-light); width:100%;}
}
.nav-mobile{display:none;}
.nav-mobile.open{display:flex;}

/* ===== HERO ===== */
.hero{padding:64px 0 32px; overflow:hidden; position:relative;}
.hero .container{display:grid; grid-template-columns:1.1fr 1fr; gap:48px; align-items:center;}
.eyebrow{display:inline-flex; align-items:center; gap:8px; background:var(--yellow-light); color:var(--yellow-deep); font-weight:800; font-size:.8rem; letter-spacing:.08em; text-transform:uppercase; padding:7px 16px; border-radius:50px; margin-bottom:18px;}
.hero h1{font-size:3rem; line-height:1.12; margin-bottom:18px;}
.hero h1 .accent{color:var(--green);}
.hero p.lead{font-size:1.12rem; color:var(--gray); max-width:480px; margin-bottom:28px;}
.hero-ctas{display:flex; gap:14px; flex-wrap:wrap;}
@media (max-width:880px){
  .hero .container{grid-template-columns:1fr;}
  .hero h1{font-size:2.2rem;}
}

/* hero decorative blobs */
.hero{position:relative; padding:64px 0 0;}
.hero::before, .hero::after{
  content:''; position:absolute; border-radius:50%; z-index:0; filter:blur(2px);
}
.hero::before{width:280px; height:280px; background:radial-gradient(circle at 30% 30%, var(--yellow-light), transparent 70%); top:-60px; left:-90px;}
.hero::after{width:340px; height:340px; background:radial-gradient(circle at 70% 70%, var(--green-light), transparent 70%); bottom:-120px; right:-110px;}
.hero .container{position:relative; z-index:1;}

/* floating badges over journey illustration */
.journey-wrap{position:relative;}
.float-badge{
  position:absolute; display:flex; align-items:center; gap:10px;
  background:#fff; border-radius:50px; padding:10px 18px; box-shadow:var(--shadow);
  font-family:'Baloo 2',sans-serif; font-weight:700; font-size:.85rem; color:var(--green-deep);
  animation:floatY 4s ease-in-out infinite;
}
.float-badge .num{font-size:1.05rem; color:var(--green);}
.float-badge.b1{top:6%; right:2%; animation-delay:0s;}
.float-badge.b2{bottom:8%; left:0%; animation-delay:1.6s;}
@keyframes floatY{0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);}}
@media (prefers-reduced-motion:reduce){.float-badge{animation:none;}}
@media (max-width:600px){.float-badge{display:none;}}

/* wave divider */
.wave{display:block; width:100%; line-height:0;}
.wave svg{display:block; width:100%; height:60px;}

/* stats band */
.stats-band{background:linear-gradient(120deg, var(--green-deep), var(--green-dark)); position:relative;}
.stats-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:24px; padding:46px 0 56px; text-align:center;}
@media (max-width:760px){.stats-grid{grid-template-columns:repeat(2,1fr); gap:30px;}}
.stat-item .num{font-family:'Baloo 2',sans-serif; font-size:2.4rem; font-weight:800; color:var(--yellow); display:flex; align-items:center; justify-content:center; gap:6px;}
.stat-item .num .ico{font-size:1.6rem;}
.stat-item .cap{color:#D8F0DF; font-weight:700; font-size:.92rem; margin-top:4px;}

/* gradient buttons */
.btn-primary{background:linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);}
.btn-yellow{background:linear-gradient(135deg, var(--yellow) 0%, var(--yellow-deep) 100%);}

/* testimonials */
.testimonial-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:22px;}
@media (max-width:860px){.testimonial-grid{grid-template-columns:1fr;}}
.testimonial-card{background:#fff; border-radius:var(--radius-lg); padding:26px; border:1px solid var(--gray-light); box-shadow:var(--shadow-sm); position:relative;}
.testimonial-card .quote-mark{font-family:'Baloo 2',sans-serif; font-size:2.6rem; color:var(--yellow); line-height:1; margin-bottom:6px;}
.testimonial-card p.quote{color:var(--ink); font-size:.96rem; margin-bottom:18px;}
.testimonial-author{display:flex; align-items:center; gap:12px;}
.avatar-circle{width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Baloo 2',sans-serif; font-weight:700; color:#fff; font-size:1rem; flex-shrink:0;}
.testimonial-author .name{font-weight:800; font-size:.92rem; color:var(--green-deep);}
.testimonial-author .role{font-size:.78rem; color:var(--gray);}
.stars{color:var(--yellow-deep); font-size:.85rem; margin-bottom:10px; letter-spacing:2px;}

/* program card accent */
.program-card{position:relative; overflow:hidden;}
.program-card::before{content:''; position:absolute; top:0; left:0; right:0; height:6px; background:var(--accent, var(--green));}
.program-icon{background:linear-gradient(135deg, var(--yellow-light), #fff);}

/* journey svg */
.journey-wrap{position:relative;}
.journey-svg{width:100%; height:auto; display:block;}
.journey-label{font-family:'Baloo 2',sans-serif; font-weight:700; font-size:14px; fill:var(--green-deep);}
.journey-sub{font-family:'Nunito',sans-serif; font-size:11px; fill:var(--gray); font-weight:700;}
.journey-dash{stroke-dasharray:10 8; stroke-dashoffset:1200; animation:dash 2.6s ease forwards;}
@keyframes dash{to{stroke-dashoffset:0;}}
.journey-stop circle.ring{transform-origin:center; animation:pop .5s ease both;}
.journey-stop:nth-of-type(2) circle.ring{animation-delay:.4s;}
.journey-stop:nth-of-type(3) circle.ring{animation-delay:.8s;}
.journey-stop:nth-of-type(4) circle.ring{animation-delay:1.2s;}
@keyframes pop{from{transform:scale(0);} to{transform:scale(1);}}
@media (prefers-reduced-motion:reduce){
  .journey-dash{animation:none; stroke-dashoffset:0;}
  .journey-stop circle.ring{animation:none;}
}

/* ===== SECTION GENERIC ===== */
.section{padding:72px 0;}
.section-head{text-align:center; max-width:660px; margin:0 auto 44px;}
.section-head .eyebrow{margin-bottom:14px;}
.section-head h2{font-size:2.2rem; margin-bottom:12px;}
.section-head p{color:var(--gray); font-size:1.05rem;}
.section-alt{background:var(--green-light);}
.section-yellow{background:var(--yellow-light);}

/* about section + kids illustration */
.about-wrap{display:grid; grid-template-columns:1fr 1fr; gap:46px; align-items:center;}
@media (max-width:860px){.about-wrap{grid-template-columns:1fr; text-align:center;}}
.kids-illustration{width:100%; height:auto; display:block;}

/* gallery */
.gallery-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
@media (max-width:900px){.gallery-grid{grid-template-columns:repeat(2,1fr);}}
.gallery-item{border-radius:var(--radius-md); overflow:hidden; aspect-ratio:1; box-shadow:var(--shadow-sm); position:relative;}
.gallery-item img{width:100%; height:100%; object-fit:cover; transition:transform .25s ease;}
.gallery-item:hover img{transform:scale(1.07);}
.gallery-item.gallery-sample svg{width:100%; height:100%; display:block; transition:transform .25s ease;}
.gallery-item.gallery-sample:hover svg{transform:scale(1.06);}
.gallery-caption{position:absolute; bottom:0; left:0; right:0; background:rgba(30,74,48,0.55); color:#fff; font-family:'Baloo 2',sans-serif; font-weight:700; font-size:.85rem; padding:8px 12px;}

/* Programs */
.programs-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:22px;}
@media (max-width:1000px){.programs-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.programs-grid{grid-template-columns:1fr;}}
.program-card{background:#fff; border-radius:var(--radius-lg); padding:28px 24px; box-shadow:var(--shadow-sm); border:1px solid var(--gray-light); transition:transform .18s ease, box-shadow .18s ease;}
.program-card:hover{transform:translateY(-4px); box-shadow:var(--shadow);}
.program-icon{font-size:2.2rem; width:58px; height:58px; display:flex; align-items:center; justify-content:center; background:var(--yellow-light); border-radius:16px; margin-bottom:16px;}
.program-card h3{font-size:1.2rem; margin-bottom:6px;}
.program-age{display:inline-block; background:var(--green-light); color:var(--green-dark); font-weight:800; font-size:.74rem; letter-spacing:.04em; padding:4px 10px; border-radius:50px; margin-bottom:10px;}
.program-card p{color:var(--gray); font-size:.95rem;}

/* Why us */
.why-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:18px;}
@media (max-width:700px){.why-grid{grid-template-columns:1fr;}}
.why-item{display:flex; gap:14px; align-items:flex-start; background:#fff; border-radius:var(--radius-md); padding:18px 20px; border:1px solid var(--gray-light); transition:transform .15s ease, box-shadow .15s ease;}
.why-item:hover{transform:translateY(-3px); box-shadow:var(--shadow-sm);}
.why-item .ico{font-size:1.5rem; flex-shrink:0; width:46px; height:46px; border-radius:14px; display:flex; align-items:center; justify-content:center;}
.why-item h4{font-size:1.02rem; margin-bottom:3px;}
.why-item p{color:var(--gray); font-size:.92rem; margin:0;}

/* Notices */
.notice-list{display:flex; flex-direction:column; gap:14px; max-width:760px; margin:0 auto;}
.notice-item{display:flex; gap:16px; align-items:flex-start; background:#fff; border-radius:var(--radius-md); padding:18px 22px; border:1px solid var(--gray-light); box-shadow:var(--shadow-sm);}
.notice-date{flex-shrink:0; background:var(--green); color:#fff; font-family:'Baloo 2',sans-serif; font-weight:700; border-radius:12px; width:62px; height:62px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:.78rem; line-height:1.1;}
.notice-date strong{font-size:1.3rem;}
.notice-body h4{margin-bottom:4px; font-size:1.05rem;}
.notice-body p{color:var(--gray); font-size:.92rem; margin:0;}
.pin-badge{display:inline-block; background:var(--yellow-light); color:var(--yellow-deep); font-size:.7rem; font-weight:800; padding:2px 8px; border-radius:50px; margin-left:8px; vertical-align:middle;}
.empty-state{text-align:center; color:var(--gray); padding:32px; font-style:italic;}

/* Admission form */
.admission-wrap{display:grid; grid-template-columns:1fr 1fr; gap:46px; align-items:center;}
@media (max-width:860px){.admission-wrap{grid-template-columns:1fr;}}
.form-card{background:#fff; border-radius:var(--radius-lg); padding:32px; box-shadow:var(--shadow); border:1px solid var(--gray-light);}
.form-row{margin-bottom:16px;}
.form-row label{display:block; font-weight:700; font-size:.88rem; margin-bottom:6px; color:var(--green-deep);}
.form-row input, .form-row select, .form-row textarea{
  width:100%; padding:12px 14px; border-radius:var(--radius-sm); border:1.5px solid var(--gray-light);
  font-family:'Nunito',sans-serif; font-size:.96rem; background:var(--cream); color:var(--ink);
  transition:border-color .15s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus{outline:none; border-color:var(--green);}
.form-grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media (max-width:480px){.form-grid2{grid-template-columns:1fr;}}
.success-msg{background:var(--green-light); color:var(--green-deep); border-radius:var(--radius-md); padding:16px 20px; font-weight:700; display:flex; align-items:center; gap:10px;}

/* Contact / footer */
.contact-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:22px;}
@media (max-width:800px){.contact-grid{grid-template-columns:1fr;}}
.contact-card{background:#fff; border-radius:var(--radius-md); padding:22px; text-align:center; border:1px solid var(--gray-light); transition:transform .18s ease, box-shadow .18s ease;}
.contact-card:hover{transform:translateY(-4px); box-shadow:var(--shadow);}
.contact-card .ico{font-size:1.8rem; margin-bottom:8px;}
.contact-card h4{font-size:1rem; margin-bottom:4px;}
.contact-card p{color:var(--gray); font-size:.92rem; margin:0;}
footer{background:var(--green-deep); color:#fff; padding:40px 0 22px; margin-top:0;}
footer .container{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:18px;}
footer .brand-text strong{color:#fff;}
footer .brand-text span{color:#BFE3CC;}
.footer-links{display:flex; gap:22px; font-weight:700; font-size:.92rem;}
.footer-links a{text-decoration:none; color:#D8F0DF;}
.footer-links a:hover{color:#fff;}
.footer-bottom{text-align:center; font-size:.82rem; color:#9FCBAE; margin-top:26px; border-top:1px solid rgba(255,255,255,0.12); padding-top:18px;}

/* ===== LOGIN ===== */
.login-page{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:linear-gradient(160deg,var(--cream) 0%, var(--green-light) 100%);}
.login-card{background:#fff; border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:40px; max-width:420px; width:100%; text-align:center;}
.login-card img{height:88px; width:88px; margin:0 auto 14px; object-fit:cover; border-radius:50%; border:3px solid var(--yellow-deep); box-shadow:0 8px 22px rgba(30,74,48,0.3);}
.login-card h2{font-size:1.5rem; margin-bottom:4px;}
.login-card p.sub{color:var(--gray); font-size:.92rem; margin-bottom:24px;}
.login-card form{text-align:left;}
.hint-box{background:var(--yellow-light); border-radius:var(--radius-sm); padding:12px 14px; font-size:.82rem; color:var(--yellow-deep); margin-top:18px; font-weight:700;}
.error-msg{background:#FFF1ED; color:var(--coral); border-radius:var(--radius-sm); padding:10px 14px; font-size:.88rem; font-weight:700; margin-bottom:14px;}
.back-link{display:inline-block; margin-top:18px; font-size:.88rem; font-weight:700; color:var(--gray); text-decoration:none;}
.back-link:hover{color:var(--green-deep);}

/* ===== DASHBOARD ===== */
.dash{display:flex; min-height:100vh;}
.sidebar{width:230px; background:var(--green-deep); color:#fff; flex-shrink:0; display:flex; flex-direction:column; padding:20px 0; position:sticky; top:0; height:100vh; overflow-y:auto;}
.sidebar .brand-text strong{color:#fff;}
.sidebar .brand-text span{color:#BFE3CC;}
.sidebar .brand{padding:0 20px 18px; border-bottom:1px solid rgba(255,255,255,0.12); margin-bottom:10px;}
.sidebar .brand img{height:38px; width:38px; object-fit:cover; border-radius:50%; border:2px solid var(--yellow-deep); box-shadow:0 2px 8px rgba(0,0,0,0.35);}
.side-link{display:flex; align-items:center; gap:12px; padding:12px 22px; color:#D8F0DF; text-decoration:none; font-weight:700; font-size:.94rem; border-left:4px solid transparent; transition:background .12s; background:none; border:none; width:100%; text-align:left;}
.side-link:hover{background:rgba(255,255,255,0.06);}
.side-link.active{background:rgba(255,255,255,0.1); color:#fff; border-left:4px solid var(--yellow);}
.side-foot{margin-top:auto; padding:16px 20px; border-top:1px solid rgba(255,255,255,0.12); font-size:.85rem;}
.side-foot .who{font-weight:800; color:#fff; margin-bottom:2px;}
.side-foot .role{color:#BFE3CC; text-transform:capitalize; margin-bottom:10px; font-size:.8rem;}
.dash-main{flex:1; min-width:0;}
.dash-topbar{display:flex; align-items:center; justify-content:space-between; padding:18px 28px; background:#fff; border-bottom:1px solid var(--gray-light); position:sticky; top:0; z-index:10;}
.dash-topbar h1{font-size:1.4rem;}
.dash-content{padding:28px;}
.mobile-sidebar-toggle{display:none; background:var(--green-deep); color:#fff; border:none; border-radius:8px; padding:8px 12px; font-size:1.2rem;}
@media (max-width:900px){
  .sidebar{position:fixed; left:-240px; top:0; z-index:100; transition:left .2s; box-shadow:4px 0 24px rgba(0,0,0,0.2);}
  .sidebar.open{left:0;}
  .mobile-sidebar-toggle{display:block;}
  .dash-content{padding:18px;}
}

/* Stat cards */
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:18px; margin-bottom:30px;}
.stat-card{background:#fff; border-radius:var(--radius-md); padding:20px; border:1px solid var(--gray-light); box-shadow:var(--shadow-sm);}
.stat-card .label{font-size:.82rem; font-weight:800; color:var(--gray); text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px;}
.stat-card .value{font-family:'Baloo 2',sans-serif; font-size:1.8rem; color:var(--green-deep); font-weight:700;}
.stat-card .sub{font-size:.8rem; color:var(--gray); margin-top:4px;}

/* Cards / panels */
.panel{background:#fff; border-radius:var(--radius-lg); border:1px solid var(--gray-light); box-shadow:var(--shadow-sm); padding:24px; margin-bottom:24px;}
.panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:12px;}
.panel-head h2{font-size:1.25rem;}
.tabs{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;}
.tab-btn{background:var(--green-light); border:none; padding:9px 18px; border-radius:50px; font-weight:700; font-size:.88rem; color:var(--green-deep);}
.tab-btn.active{background:var(--green); color:#fff;}

/* Tables */
.table-wrap{overflow-x:auto;}
table{width:100%; border-collapse:collapse; font-size:.92rem;}
th,td{text-align:left; padding:11px 12px; border-bottom:1px solid var(--gray-light); white-space:nowrap;}
th{color:var(--gray); font-weight:800; font-size:.78rem; text-transform:uppercase; letter-spacing:.03em;}
tbody tr:hover{background:var(--cream);}
.badge{display:inline-block; padding:3px 11px; border-radius:50px; font-size:.76rem; font-weight:800;}
.badge-green{background:var(--green-light); color:var(--green-dark);}
.badge-yellow{background:var(--yellow-light); color:var(--yellow-deep);}
.badge-red{background:#FFF1ED; color:var(--coral);}
.badge-gray{background:var(--gray-light); color:var(--gray);}
.row-actions{display:flex; gap:6px;}
.icon-btn{background:var(--green-light); border:none; border-radius:8px; padding:6px 10px; font-size:.9rem; color:var(--green-deep);}
.icon-btn.danger{background:#FFF1ED; color:var(--coral);}
.icon-btn:hover{filter:brightness(0.95);}

/* Modal */
.modal-overlay{position:fixed; inset:0; background:rgba(31,51,39,0.45); display:flex; align-items:center; justify-content:center; z-index:200; padding:18px;}
.modal{background:#fff; border-radius:var(--radius-lg); padding:28px; max-width:520px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow);}
.modal h3{margin-bottom:18px; font-size:1.3rem;}
.modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:20px;}

/* Toast */
.toast{position:fixed; bottom:24px; right:24px; background:var(--green-deep); color:#fff; padding:14px 22px; border-radius:var(--radius-md); font-weight:700; box-shadow:var(--shadow); z-index:300; animation:toastIn .25s ease; max-width:320px;}
@keyframes toastIn{from{transform:translateY(20px); opacity:0;} to{transform:translateY(0); opacity:1;}}

.text-center{text-align:center;}
.mt-0{margin-top:0;}
.flex-between{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.muted{color:var(--gray);}
.small{font-size:.85rem;}
</style>
</head>

function todayStr(){ return new Date().toISOString().slice(0,10); }
function uid(p){ return (p||'id') + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtDate(d){
  if(!d) return '-';
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
}
function fmtMonth(d){
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-IN', {month:'long', year:'numeric'});
}
function fmtMoney(n){ return '₹' + (Math.round(Number(n)||0)).toLocaleString('en-IN'); }
function monthKey(d){ return (d || todayStr()).slice(0,7); }
function escapeHtml(s){
  if(s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
// Renders editable text, turning *word* into a highlighted accent span (after escaping)
function accentText(s){
  return escapeHtml(s).replace(/\*(.+?)\*/g, '<span class="accent">$1</span>');
}
function showToast(msg){
  state.toast = msg;
  renderToast();
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>{ state.toast = null; renderToast(); }, 2600);
}
function renderToast(){
  const root = document.getElementById('toast-root');
  root.innerHTML = state.toast ? `<div class="toast">${escapeHtml(state.toast)}</div>` : '';
}

let storageWarned = false;

// Read/write helpers: use Claude's window.storage when available (e.g. inside
// claude.ai), otherwise fall back to the browser's localStorage so the site
// keeps working when downloaded and hosted on your own domain.
async function storageRead(){
  if(window.storage && typeof window.storage.get === 'function'){
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      return res ? res.value : null;
    }catch(e){
      return null; // key not created yet
    }
  }
  try{ return localStorage.getItem(STORAGE_KEY); }catch(e){ return null; }
}
async function storageWrite(json){
  if(window.storage && typeof window.storage.set === 'function'){
    await window.storage.set(STORAGE_KEY, json, true);
    return;
  }
  localStorage.setItem(STORAGE_KEY, json);
}

async function loadDB(){
  try{
    const raw = await storageRead();
    if(raw){
      DB = JSON.parse(raw);
      const def = defaultDB();
      Object.keys(def).forEach(k => { if(!(k in DB)) DB[k] = def[k]; });
      DB.settings = Object.assign({}, def.settings, DB.settings || {});
    } else {
      DB = defaultDB();
      await saveDB();
    }
  }catch(e){
    storageOK = false;
    DB = defaultDB();
  }
}

async function saveDB(){
  try{
    await storageWrite(JSON.stringify(DB));
  }catch(e){
    storageOK = false;
    if(!storageWarned){
      storageWarned = true;
      showToast('⚠️ Saved for this session only — your browser storage is unavailable.');
    }
  }
}

// ===== COMPUTED HELPERS =====
function getStudentPaid(studentId){
  return DB.feePayments.filter(p => p.studentId === studentId).reduce((s,p) => s + Number(p.amount), 0);
}
function getStudentDue(student){
  return Math.max(0, Number(student.totalFee||0) - getStudentPaid(student.id));
}
function getStaffPaidInMonth(staffId, mKey){
  return DB.salaryPayments.filter(p => p.staffId === staffId && monthKey(p.date) === mKey).reduce((s,p) => s + Number(p.amount), 0);
}
function getFinanceTotals(){
  const feeIncome = DB.feePayments.reduce((s,p) => s + Number(p.amount), 0);
  const manualIncome = DB.accounts.filter(a => a.type === 'income').reduce((s,a) => s + Number(a.amount), 0);
  const salaryExpense = DB.salaryPayments.reduce((s,p) => s + Number(p.amount), 0);
  const manualExpense = DB.accounts.filter(a => a.type === 'expense').reduce((s,a) => s + Number(a.amount), 0);
  const totalIncome = feeIncome + manualIncome;
  const totalExpense = salaryExpense + manualExpense;
  const mk = monthKey();
  const monthIncome = DB.feePayments.filter(p => monthKey(p.date) === mk).reduce((s,p)=>s+Number(p.amount),0)
                     + DB.accounts.filter(a => a.type==='income' && monthKey(a.date)===mk).reduce((s,a)=>s+Number(a.amount),0);
  const monthExpense = DB.salaryPayments.filter(p => monthKey(p.date) === mk).reduce((s,p)=>s+Number(p.amount),0)
                     + DB.accounts.filter(a => a.type==='expense' && monthKey(a.date)===mk).reduce((s,a)=>s+Number(a.amount),0);
  return {feeIncome, manualIncome, salaryExpense, manualExpense, totalIncome, totalExpense,
          balance: totalIncome - totalExpense, monthIncome, monthExpense};
}

function render(){
  const app = document.getElementById('app');
  if(state.view === 'loading'){
    app.innerHTML = `<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Baloo 2',sans-serif; color:var(--green-deep); font-size:1.2rem;">Loading ${SCHOOL_SHORT}...</div>`;
    return;
  }
  if(state.view === 'login'){
    app.innerHTML = renderLogin();
    return;
  }
  if(state.view === 'dashboard'){
    app.innerHTML = renderDashboard();
    return;
  }
  app.innerHTML = renderPublic();
  // trigger journey animation re-run isn't needed (CSS handles on load)
}

function renderUpcomingEvents(){
  const today = todayStr();
  const list = [...DB.activities].filter(a => a.date >= today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,4);
  if(!list.length) return '';
  return `
  <section class="section section-yellow" id="events">
    <div class="container">
      <div class="section-head">
        <span class="eyebrow">What's Happening</span>
        <h2>Upcoming Events</h2>
        <p>Mark your calendars — here's what's coming up at ${SCHOOL_SHORT}.</p>
      </div>
      <div class="notice-list">
        ${list.map(a => `
          <div class="notice-item">
            <div class="notice-date"><strong>${new Date(a.date+'T00:00:00').getDate()}</strong><span>${new Date(a.date+'T00:00:00').toLocaleDateString('en-IN',{month:'short'})}</span></div>
            <div class="notice-body">
              <h4>${escapeHtml(a.title)} <span class="badge badge-green">${escapeHtml(a.type)}</span></h4>
              <p>${a.time?'⏰ '+escapeHtml(a.time)+' &middot; ':''}${escapeHtml(a.description||'')}</p>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  </section>`;
}

function renderNotices(){
  const list = [...DB.notices].sort((a,b) => (b.pinned - a.pinned) || (b.date.localeCompare(a.date))).slice(0,5);
  return `
  <section class="section" id="notices">
    <div class="container">
      <div class="section-head">
        <span class="eyebrow">Notice Board</span>
        <h2>Latest News &amp; Announcements</h2>
        <p>Stay updated with admissions, events and important school notices.</p>
      </div>
      ${list.length ? `<div class="notice-list">
        ${list.map(n => {
          const d = new Date(n.date+'T00:00:00');
          const day = isNaN(d) ? '--' : d.getDate();
          const mon = isNaN(d) ? '' : d.toLocaleDateString('en-IN',{month:'short'});
          return `
          <div class="notice-item">
            <div class="notice-date"><strong>${day}</strong><span>${mon}</span></div>
            <div class="notice-body">
              <h4>${escapeHtml(n.title)} ${n.pinned ? '<span class="pin-badge">📌 Pinned</span>':''}</h4>
              <p>${escapeHtml(n.body)}</p>
            </div>
          </div>`;
        }).join('')}
      </div>` : `<div class="empty-state">No notices posted yet. Please check back soon!</div>`}
    </div>
  </section>`;

function doLogin(ev){
  ev.preventDefault();
  const u = document.getElementById('lg-user').value.trim();
  const p = document.getElementById('lg-pass').value;
  const found = DB.users.find(x => x.username.toLowerCase() === u.toLowerCase() && x.password === p);
  if(!found){
    state.loginError = 'Invalid username or password. Please try again.';
    render();
    return;
  }
  state.user = found;
  state.loginError = '';
  state.view = 'dashboard';
  state.dashTab = 'home';
  render();
}

function doLogout(){
  state.user = null;
  state.view = 'public';
  render();
  window.scrollTo(0,0);
}

        </div>
        <div class="form-row"><label>Admission Date</label><input id="sf-admdate" type="date" value="${s?s.admissionDate:todayStr()}"></div>
      </div>

      </div>

          <select id="sf-status">
            <option value="active" ${s&&s.status==='active'?'selected':''}>Active</option>
            <option value="inactive" ${s&&s.status==='inactive'?'selected':''}>Inactive</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm">Save Student</button>
      </div>
    </form>
  `);
}

async function saveStudent(ev, id){
  ev.preventDefault();
  const data = {
    name: document.getElementById('sf-name').value.trim(),
    cls: document.getElementById('sf-cls').value,
    admissionDate: document.getElementById('sf-admdate').value || todayStr(),
    parentName: document.getElementById('sf-parent').value.trim(),
    phone: document.getElementById('sf-phone').value.trim(),
    totalFee: Number(document.getElementById('sf-fee').value) || 0,
    status: document.getElementById('sf-status').value
  };
  if(id){
    const s = studentById(id);
    Object.assign(s, data);
  } else {
    DB.students.push({id: uid('st'), ...data});
  }
  await saveDB();
  closeModal();
  render();
  showToast(id ? 'Student updated.' : 'Student added.');
}

async function deleteStudent(id){
  if(!confirm('Remove this student? This cannot be undone.')) return;
  DB.students = DB.students.filter(s => s.id !== id);
  DB.feePayments = DB.feePayments.filter(p => p.studentId !== id);
  await saveDB();
  render();
  showToast('Student removed.');
}

function renderStudentAttendance(){
  const date = state.attendanceDate;
  const recs = DB.attendanceStudents[date] || {};
  const allActive = activeStudents();
  const selectedCls = state.attendanceClass || 'all';
  const students = selectedCls === 'all' ? allActive : allActive.filter(s => s.cls === selectedCls);
  const presentCount = students.filter(s => recs[s.id] === 'present').length;
  const countFor = c => allActive.filter(s => s.cls === c).length;
  return `
  <div class="panel">
    <div class="panel-head">
      <h2>📅 Student Attendance</h2>
      <input type="date" value="${date}" max="${todayStr()}" onchange="changeAttendanceDate(this.value)" style="padding:10px 14px;border-radius:8px;border:1.5px solid var(--gray-light);font-family:inherit;">
    </div>
    <div class="tabs">
      <button class="tab-btn ${selectedCls==='all'?'active':''}" onclick="changeAttendanceClass('all')">All Classes (${allActive.length})</button>
      ${CLASS_OPTIONS.map(c => `<button class="tab-btn ${selectedCls===c?'active':''}" onclick="changeAttendanceClass('${escapeHtml(c)}')">${escapeHtml(c)} (${countFor(c)})</button>`).join('')}
    </div>
    <p class="muted small" style="margin-bottom:14px;">${fmtDate(date)} — ${selectedCls==='all' ? 'All classes' : escapeHtml(selectedCls)} — ${presentCount} of ${students.length} marked present</p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Class / Program</th><th>Status</th></tr></thead>
        <tbody>
          ${students.length ? students.map(s => `
            <tr>
              <td>${escapeHtml(s.name)}</td>
              <td>${escapeHtml(s.cls)}</td>
              <td>
                <div class="tabs" style="margin:0;">
                  <button class="tab-btn ${recs[s.id]==='present'?'active':''}" style="${recs[s.id]==='present'?'background:var(--green);color:#fff':''}" onclick="markAttendance('student','${s.id}','present')">Present</button>
                  <button class="tab-btn ${recs[s.id]==='absent'?'active':''}" style="${recs[s.id]==='absent'?'background:var(--coral);color:#fff':''}" onclick="markAttendance('student','${s.id}','absent')">Absent</button>
                  <button class="tab-btn ${recs[s.id]==='leave'?'active':''}" style="${recs[s.id]==='leave'?'background:var(--yellow-deep);color:#fff':''}" onclick="markAttendance('student','${s.id}','leave')">Leave</button>
                </div>
              </td>
            </tr>
          `).join('') : `<tr><td colspan="3"><div class="empty-state">${selectedCls==='all' ? 'No active students to mark attendance for.' : 'No active students in this class yet.'}</div></td></tr>`}
        </tbody>
      </table>
    </div>
  </div>`;

function changeAttendanceClass(cls){ state.attendanceClass = cls; render(); }

async function markAttendance(kind, personId, status){
  const key = kind === 'student' ? 'attendanceStudents' : 'attendanceStaff';
  const date = kind === 'student' ? state.attendanceDate : state.staffAttendanceDate;
  if(!DB[key][date]) DB[key][date] = {};
  if(DB[key][date][personId] === status){
    delete DB[key][date][personId]; // toggle off
  } else {
    DB[key][date][personId] = status;
  }
  await saveDB();
  render();
}

        <div class="form-row"><label>Date</label><input id="ac-date" type="date" value="${todayStr()}"></div>
      </div>
      <div class="form-row"><label>Note (optional)</label><input id="ac-note" placeholder="e.g. June electricity bill"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm">Save</button>
      </div>
    </form>
  `);
}

function updateAccountCategories(){
  const type = document.getElementById('ac-type').value;
  document.getElementById('ac-category').innerHTML = TXN_CATEGORIES[type].map(c=>`<option>${c}</option>`).join('');
}

async function saveAccountEntry(ev){
  ev.preventDefault();
  const amount = Number(document.getElementById('ac-amount').value);
  if(!amount || amount <= 0) return;
  DB.accounts.push({
    id: uid('ac'),
    type: document.getElementById('ac-type').value,
    category: document.getElementById('ac-category').value,
    amount, date: document.getElementById('ac-date').value || todayStr(),
    note: document.getElementById('ac-note').value.trim()
  });
  await saveDB();
  closeModal();
  render();
  showToast('Transaction added.');
}

async function deleteAccountEntry(id){
  if(!confirm('Delete this transaction?')) return;
  DB.accounts = DB.accounts.filter(a => a.id !== id);
  await saveDB();
  render();
  showToast('Transaction deleted.');
}

// NOTICES ADMIN
// ============================================================
function renderNoticesAdmin(){
  const list = [...DB.notices].sort((a,b)=>(b.pinned-a.pinned)||b.date.localeCompare(a.date));
  return `
  <div class="panel">
    <div class="panel-head">
      <h2>📢 Notices &amp; Announcements</h2>
      <button class="btn btn-primary btn-sm" onclick="openNoticeForm()">+ Add Notice</button>
    </div>
    <p class="muted small" style="margin-bottom:14px;">These notices appear on the public website's Notice Board (pinned notices appear first).</p>
    <div class="notice-list" style="max-width:none;">
      ${list.length ? list.map(n => `
        <div class="notice-item">
          <div class="notice-date"><strong>${new Date(n.date+'T00:00:00').getDate()}</strong><span>${new Date(n.date+'T00:00:00').toLocaleDateString('en-IN',{month:'short'})}</span></div>
          <div class="notice-body" style="flex:1;">
            <h4>${escapeHtml(n.title)} ${n.pinned?'<span class="pin-badge">📌 Pinned</span>':''}</h4>
            <p>${escapeHtml(n.body)}</p>
          </div>
          <div class="row-actions">
            <button class="icon-btn" onclick="togglePin('${n.id}')" title="${n.pinned?'Unpin':'Pin'}">📌</button>
            <button class="icon-btn" onclick="openNoticeForm('${n.id}')" title="Edit">✏️</button>
            <button class="icon-btn danger" onclick="deleteNotice('${n.id}')" title="Delete">🗑️</button>
          </div>
        </div>
      `).join('') : `<div class="empty-state">No notices yet.</div>`}
    </div>
  </div>`;
}

function openNoticeForm(id){
  const n = id ? DB.notices.find(x=>x.id===id) : null;
  openModal(`
    <h3>${n?'Edit Notice':'Add Notice'}</h3>
    <form onsubmit="saveNotice(event,'${id||''}')">
      <div class="form-row"><label>Title</label><input id="nt-title" required value="${n?escapeHtml(n.title):''}"></div>
      <div class="form-row"><label>Date</label><input id="nt-date" type="date" value="${n?n.date:todayStr()}"></div>
      <div class="form-row"><label>Details</label><textarea id="nt-body" rows="4" required>${n?escapeHtml(n.body):''}</textarea></div>
      <div class="form-row"><label><input type="checkbox" id="nt-pin" ${n&&n.pinned?'checked':''} style="width:auto;margin-right:8px;">Pin to top of notice board</label></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm">Save Notice</button>
      </div>
    </form>
  `);
}

async function saveNotice(ev,id){
  ev.preventDefault();
  const data = {
    title: document.getElementById('nt-title').value.trim(),
    date: document.getElementById('nt-date').value || todayStr(),
    body: document.getElementById('nt-body').value.trim(),
    pinned: document.getElementById('nt-pin').checked
  };
  if(id){ Object.assign(DB.notices.find(x=>x.id===id), data); }
  else { DB.notices.unshift({id: uid('nt'), ...data}); }
  await saveDB();
  closeModal();
  render();
  showToast(id?'Notice updated.':'Notice published.');
}

async function togglePin(id){
  const n = DB.notices.find(x=>x.id===id);
  n.pinned = !n.pinned;
  await saveDB();
  render();
}

async function deleteNotice(id){
  if(!confirm('Delete this notice?')) return;
  DB.notices = DB.notices.filter(n=>n.id!==id);
  await saveDB();
  render();
  showToast('Notice deleted.');
}

// USERS (STAFF LOGINS) - admin only
// ============================================================
function renderUsers(){
  return `
  <div class="panel">
    <div class="panel-head">
      <h2>🔑 Staff Login Accounts (${DB.users.length})</h2>
      <button class="btn btn-primary btn-sm" onclick="openUserForm()">+ Add Login</button>
    </div>
    <p class="muted small" style="margin-bottom:14px;">
      <strong>Admin</strong> can access everything. <strong>Teacher</strong> can manage students &amp; attendance. <strong>Accountant</strong> can manage fees, salaries &amp; accounts.
    </p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Username</th><th>Role</th><th></th></tr></thead>
        <tbody>
          ${DB.users.map(u => `
            <tr>
              <td>${escapeHtml(u.name)}</td><td>${escapeHtml(u.username)}</td>
              <td><span class="badge badge-green">${u.role}</span></td>
              <td class="row-actions">
                <button class="icon-btn" onclick="openUserForm('${u.username}')" title="Edit">✏️</button>
                <button class="icon-btn danger" onclick="deleteUser('${u.username}')" title="Remove" ${DB.users.length<=1?'disabled style="opacity:.4;cursor:not-allowed;"':''}>🗑️</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function openUserForm(username){
  const u = username ? DB.users.find(x=>x.username===username) : null;
  openModal(`
    <h3>${u?'Edit Login':'Add Login'}</h3>
    <form onsubmit="saveUser(event,'${username||''}')">
      <div class="form-row"><label>Full Name</label><input id="us-name" required value="${u?escapeHtml(u.name):''}"></div>
      <div class="form-row"><label>Username</label><input id="us-user" required value="${u?escapeHtml(u.username):''}" ${u?'readonly style="background:var(--gray-light);"':''}></div>
      <div class="form-row"><label>Password</label><input id="us-pass" required value="${u?escapeHtml(u.password):''}"></div>
      <div class="form-row"><label>Role</label>
        <select id="us-role">
          <option value="admin" ${u&&u.role==='admin'?'selected':''}>Admin (full access)</option>
          <option value="teacher" ${u&&u.role==='teacher'?'selected':''}>Teacher (students &amp; attendance)</option>
          <option value="accountant" ${u&&u.role==='accountant'?'selected':''}>Accountant (fees, salary &amp; accounts)</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm">Save</button>
      </div>
    </form>
  `);
}

async function saveUser(ev, username){
  ev.preventDefault();
  const newUsername = document.getElementById('us-user').value.trim();
  const data = {
    name: document.getElementById('us-name').value.trim(),
    username: newUsername,
    password: document.getElementById('us-pass').value,
    role: document.getElementById('us-role').value
  };
  if(username){
    const existing = DB.users.find(x=>x.username===username);
    Object.assign(existing, data);
    if(state.user.username === username) state.user = existing;
  } else {
    if(DB.users.some(x=>x.username.toLowerCase()===newUsername.toLowerCase())){
      alert('A user with this username already exists.');
      return;
    }
    DB.users.push(data);
  }
  await saveDB();
  closeModal();
  render();
  showToast('Login saved.');
}

async function deleteUser(username){
  if(DB.users.length <= 1){ alert('At least one login account must remain.'); return; }
  if(!confirm('Remove this login account?')) return;
  DB.users = DB.users.filter(u=>u.username!==username);
  await saveDB();
  render();
  showToast('Login removed.');
}

// WEBSITE SETTINGS (theme, text content, gallery) - admin only
// ============================================================
function renderSettings(){
  const s = DB.settings;
  return `
  <div class="panel">
    <div class="panel-head"><h2>🎨 Theme Colours</h2></div>
    <p class="muted small" style="margin-bottom:14px;">Pick a colour theme for the public website. Changes apply instantly for everyone.</p>
    <div style="display:flex; gap:14px; flex-wrap:wrap;">
      ${Object.keys(THEME_PRESETS).map(key => {
        const t = THEME_PRESETS[key];
        const active = s.theme === key;
        return `
        <button onclick="changeTheme('${key}')" style="border:${active?'3px solid '+t.vars['--green']:'2px solid var(--gray-light)'}; border-radius:16px; padding:14px 18px; background:#fff; min-width:140px; text-align:left; cursor:pointer;">
          <div style="display:flex; gap:6px; margin-bottom:8px;">
            <span style="display:inline-block;width:22px;height:22px;border-radius:50%;background:${t.vars['--green']}"></span>
            <span style="display:inline-block;width:22px;height:22px;border-radius:50%;background:${t.vars['--yellow']}"></span>
            <span style="display:inline-block;width:22px;height:22px;border-radius:50%;background:${t.vars['--coral']}"></span>
          </div>
          <strong style="font-family:'Baloo 2',sans-serif;">${t.icon} ${t.label}</strong>
          ${active ? '<div class="small" style="color:var(--green);font-weight:800;margin-top:4px;">✓ Active</div>' : ''}
        </button>`;
      }).join('')}
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><h2>📝 Homepage Text</h2></div>
    <form onsubmit="saveSettingsText(event)">
      <div class="form-row">
        <label>Hero Heading <span class="muted small">(wrap a word in *asterisks* to highlight it in green)</span></label>
        <input id="set-herotitle" value="${escapeHtml(s.heroTitle)}">
      </div>
      <div class="form-row">
        <label>Hero Subtitle</label>
        <textarea id="set-herosub" rows="2">${escapeHtml(s.heroSubtitle)}</textarea>
      </div>
      <div class="form-row">
        <label>About Us Paragraph</label>
        <textarea id="set-about" rows="3">${escapeHtml(s.aboutText)}</textarea>
      </div>
      <div class="panel-head" style="margin-top:6px;"><h2 style="font-size:1.05rem;">Contact Details</h2></div>
      <div class="form-row"><label>Address</label><input id="set-address" value="${escapeHtml(s.address)}"></div>
      <div class="form-grid2">
        <div class="form-row"><label>Phone</label><input id="set-phone" value="${escapeHtml(s.phone)}"></div>
        <div class="form-row"><label>Email</label><input id="set-email" value="${escapeHtml(s.email)}"></div>
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h2>🖼️ Photo Gallery</h2>
      <label class="btn btn-primary btn-sm" style="margin:0;">+ Upload Photo
        <input type="file" accept="image/*" onchange="handleGalleryUpload(event)" style="display:none;">
      </label>
    </div>
    <p class="muted small" style="margin-bottom:14px;">Upload real photos of your school, classrooms, activities and events — they'll appear in the "Campus Life" gallery on the public website. Photos are resized automatically.</p>
    ${s.gallery && s.gallery.length ? `<div class="gallery-grid">
      ${s.gallery.map(g => `
        <div style="position:relative;">
          <div class="gallery-item"><img src="${g.src}" alt="${escapeHtml(g.caption||'')}"></div>
          <button class="icon-btn danger" style="position:absolute; top:8px; right:8px;" onclick="deleteGalleryImage('${g.id}')" title="Remove">🗑️</button>
        </div>
      `).join('')}
    </div>` : `<div class="empty-state">No photos uploaded yet.</div>`}
  </div>`;
}

async function changeTheme(key){
  DB.settings.theme = key;
  applyTheme(key);
  await saveDB();
  render();
  showToast('Theme updated.');
}

async function saveSettingsText(ev){
  ev.preventDefault();
  DB.settings.heroTitle = document.getElementById('set-herotitle').value.trim();
  DB.settings.heroSubtitle = document.getElementById('set-herosub').value.trim();
  DB.settings.aboutText = document.getElementById('set-about').value.trim();
  DB.settings.address = document.getElementById('set-address').value.trim();
  DB.settings.phone = document.getElementById('set-phone').value.trim();
  DB.settings.email = document.getElementById('set-email').value.trim();
  await saveDB();
  showToast('Website content updated.');
}

function handleGalleryUpload(ev){
  const file = ev.target.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ showToast('Please choose an image file.'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = async function(){
      const maxW = 1000;
      let w = img.width, h = img.height;
      if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.78);
      DB.settings.gallery.push({id: uid('gl'), src: dataUrl, caption:''});
      await saveDB();
      render();
      showToast('Photo added to gallery.');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function deleteGalleryImage(id){
  if(!confirm('Remove this photo from the gallery?')) return;
  DB.settings.gallery = DB.settings.gallery.filter(g => g.id !== id);
  await saveDB();
  render();
  showToast('Photo removed.');
}

  await loadDB();
  applyTheme(DB.settings.theme);
  state.view = 'public';
  render();
}
init();
</script>
