backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Website Pages"
    delete: false
    create: false
    files:
      - title: "Home Page"
        name: "index"
        file: "index.html"
        fields:
          - { label: "School Title Tag", name: "title", widget: "string" }
